name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: lint → type-check → test
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Frontend unit tests
        run: npm test

  # ──────────────────────────────────────────────────────────────────────────
  # Rust: clippy → test → build
  # ──────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (clippy · test · build)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust format check
        run: cargo fmt --check

      - name: Rust lint (clippy)
        run: cargo clippy --lib -- -D warnings

      - name: Rust unit tests
        env:
          RUSTFLAGS: -C link-arg=/MANIFEST:EMBED -C link-arg=/MANIFESTINPUT:${{ github.workspace }}/.github/windows-test.manifest
        run: cargo test --lib

      - name: Rust release build
        run: cargo build --release

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: pisci-desktop-windows
          path: target/release/pisci-desktop.exe
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Package: Tauri bundle — runs on push to main/master OR on version tags
  # When triggered by a tag push, uploads the installer to the GitHub release.
  # ──────────────────────────────────────────────────────────────────────────
  package:
    name: Tauri Bundle
    needs: [frontend, rust]
    runs-on: windows-latest
    # Required for softprops/action-gh-release to upload assets on tag pushes (default GITHUB_TOKEN is read-only otherwise).
    permissions:
      contents: write
    if: >
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/tags/v')
      ))
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installer artefacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: pisci-desktop-installer
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach installer to GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: true
